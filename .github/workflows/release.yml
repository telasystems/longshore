name: Release

# Tag-driven: `git tag vX.Y.Z && git push --tags` verifies the tag, runs the
# CI workflow (build the wheel → test that artifact), publishes the SAME
# artifact to PyPI via trusted publishing (no tokens), creates the GitHub
# release, and moves the floating major tag (v0/v1) that action consumers pin.
#
# One-time setup on PyPI: add a "trusted publisher" for the `longshore`
# project pointing at this repo + this workflow file + environment `pypi`.

on:
  push:
    tags: ["v*"]

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.0

      - name: Check tag matches pyproject version
        run: |
          version=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          [ "v$version" = "${GITHUB_REF_NAME}" ] || {
            echo "tag ${GITHUB_REF_NAME} != pyproject version $version"; exit 1; }

  ci:
    # Build once, test the built wheel; uploads the `dist` artifact this
    # run's publish job downloads — no rebuild between test and publish.
    needs: check-tag
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        # PEP 440 pre-release tags (v0.1.0rc1, v1.0.0a1, …) are marked as
        # GitHub pre-releases.
        run: |
          args=(--generate-notes)
          [[ "$GITHUB_REF_NAME" =~ (a|b|rc|dev)[0-9]+$ ]] && args+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" dist/* "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Move the floating major tag
        # Only stable releases move v0/v1 — action consumers pin those, and
        # a pre-release must never be served to `uses: …@v0`.
        run: |
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc|dev)[0-9]+$ ]]; then
            echo "pre-release tag; not moving the major tag"
            exit 0
          fi
          major="${GITHUB_REF_NAME%%.*}"
          git tag -f "$major" "$GITHUB_REF_NAME"
          git push -f origin "$major"
