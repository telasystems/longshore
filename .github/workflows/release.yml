name: Release

# Tag-driven: `git tag vX.Y.Z && git push --tags` builds, publishes to PyPI
# via trusted publishing (no tokens), creates the GitHub release, and moves
# the floating major tag (v0/v1) that action consumers pin.
#
# One-time setup on PyPI: add a "trusted publisher" for the `longshore`
# project pointing at this repo + this workflow file + environment `pypi`.

on:
  push:
    tags: ["v*"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5

      - name: Check tag matches pyproject version
        run: |
          version=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          [ "v$version" = "${GITHUB_REF_NAME}" ] || {
            echo "tag ${GITHUB_REF_NAME} != pyproject version $version"; exit 1; }

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Move the floating major tag
        run: |
          major="${GITHUB_REF_NAME%%.*}"
          git tag -f "$major" "$GITHUB_REF_NAME"
          git push -f origin "$major"
