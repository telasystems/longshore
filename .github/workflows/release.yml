name: Release

# Tag-driven: `git tag vX.Y.Z && git push --tags` verifies the tag, runs the
# CI workflow (build the wheel → test that artifact), publishes the SAME
# artifact to PyPI via trusted publishing (no tokens), and creates the
# GitHub release. No floating major tag (v0/v1) is maintained: release tags
# are immutable and action consumers pin a release's commit SHA.
#
# One-time setup on PyPI: add a "trusted publisher" for the `longshore`
# project pointing at this repo + this workflow file + environment `pypi`.

on:
  push:
    tags: ["v*"]

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Check tag matches pyproject version
        run: |
          version=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          [ "v$version" = "${GITHUB_REF_NAME}" ] || {
            echo "tag ${GITHUB_REF_NAME} != pyproject version $version"; exit 1; }

  ci:
    # Build once, test the built wheel; uploads the `dist` artifact this
    # run's publish job downloads — no rebuild between test and publish.
    needs: check-tag
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        # PEP 440 pre-release tags (v0.1.0rc1, v1.0.0a1, …) are marked as
        # GitHub pre-releases.
        run: |
          args=(--generate-notes)
          [[ "$GITHUB_REF_NAME" =~ (a|b|rc|dev)[0-9]+$ ]] && args+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" dist/* "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

  update-readme:
    # A commit cannot contain its own SHA, so the README example can never
    # pin the release it ships in. Instead: after a stable release, open a
    # PR repointing main's README at the fresh release SHA (a PR rather
    # than a direct push so this survives any branch protection on main;
    # merging it is a human step). The PyPI page (rendered from the tagged
    # snapshot) shows the previous release's pin, which stays valid because
    # release tags are immutable.
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main

      - name: PR the README action example to this release
        run: |
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc|dev)[0-9]+$ ]]; then
            echo "pre-release; leaving the README example alone"
            exit 0
          fi
          sed -i -E "s|(uses: telasystems/longshore@)[0-9a-f]{40} # v[^ ]+|\1${GITHUB_SHA} # ${GITHUB_REF_NAME}|" README.md
          if git diff --quiet; then
            echo "README already points at ${GITHUB_SHA}"
            exit 0
          fi
          branch="docs/readme-${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -am "docs: pin README action example to ${GITHUB_REF_NAME}"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "docs: pin README action example to ${GITHUB_REF_NAME}" \
            --body "Automated post-release update: the action example now pins ${GITHUB_REF_NAME} (${GITHUB_SHA})."
        env:
          GH_TOKEN: ${{ github.token }}
