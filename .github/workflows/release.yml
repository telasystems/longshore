name: Release

# Tag-driven: `git tag vX.Y.Z && git push --tags` verifies the tag, runs the
# CI workflow (build the wheel → test that artifact), publishes the SAME
# artifact to PyPI via trusted publishing (no tokens), and creates the
# GitHub release. No floating major tag (v0/v1) is maintained: release tags
# are immutable and action consumers pin a release's commit SHA.
#
# One-time setup on PyPI: add a "trusted publisher" for the `longshore`
# project pointing at this repo + this workflow file + environment `pypi`.

on:
  push:
    tags: ["v*"]

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Check tag matches pyproject version
        run: |
          version=$(uvx --from toml-cli toml get --toml-path pyproject.toml project.version)
          [ "v$version" = "${GITHUB_REF_NAME}" ] || {
            echo "tag ${GITHUB_REF_NAME} != pyproject version $version"; exit 1; }

  ci:
    # Build once, test the built wheel; uploads the `dist` artifact this
    # run's publish job downloads — no rebuild between test and publish.
    needs: check-tag
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        # PEP 440 pre-release tags (v0.1.0rc1, v1.0.0a1, …) are marked as
        # GitHub pre-releases.
        run: |
          args=(--generate-notes)
          [[ "$GITHUB_REF_NAME" =~ (a|b|rc|dev)[0-9]+$ ]] && args+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" dist/* "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
