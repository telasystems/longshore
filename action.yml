name: "longshore deploy"
description: "Contract-driven ECS deploy: configures AWS creds via OIDC, then runs `longshore deploy` from this checkout"
branding:
  icon: anchor
  color: blue
inputs:
  service-name:
    description: "Service name (must match the /services/{name} SSM prefix)"
    required: true
  image:
    description: "Full container image URL with tag"
    required: true
  role-arn:
    description: "IAM role ARN to assume via OIDC (the service's deploy role)"
    required: true
  aws-region:
    description: "AWS region"
    required: true
  wait-minutes:
    description: "Minutes to wait for the rollout to complete"
    required: false
    default: "12"

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

    - name: Deploy
      shell: bash
      # Runs the version of longshore checked out at the action's own ref,
      # so `uses: telasystems/longshore@<sha>` pins code and action together.
      run: |
        uv run --frozen --project "${{ github.action_path }}" \
          longshore deploy \
          --service "${{ inputs.service-name }}" \
          --image "${{ inputs.image }}" \
          --region "${{ inputs.aws-region }}" \
          --wait-minutes "${{ inputs.wait-minutes }}"
